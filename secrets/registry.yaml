# ReDows registry-secrets catalog (block 7) — app secrets/config that live ONLY in the
# registry, which a file scan misses entirely. Read-only, NAMES only: a value marked a
# secret is recorded by its location, never read. 'config' value names are reconstructable
# metadata worth keeping (host, port, user); any other name found is surfaced for REVIEW.
schema_version: 1
targets:

  # ── PuTTY (no passwords are ever stored) ────────────────────────────────────
  - id: putty.sessions
    app: PuTTY
    hive: hkcu
    key: 'Software\SimonTatham\PuTTY\Sessions'
    shape: subkeys
    sensitivity: config_only
    config_values: [HostName, PortNumber, UserName, Protocol, PublicKeyFile, ProxyHost, ProxyPort, ProxyUsername, PortForwardings, LogFileName]
    what: Saved PuTTY sessions (servers, ports, usernames) — PuTTY never stores passwords

  - id: putty.ssh_host_keys
    app: PuTTY
    hive: hkcu
    key: 'Software\SimonTatham\PuTTY\SshHostKeys'
    shape: values
    sensitivity: config_only
    unmatched: config   # every value name IS a host identity (the list of hosts you trust)
    what: Known SSH host keys (each value name is a host identity) — the list of hosts you trust

  # ── WinSCP (sessions + reversibly-obfuscated passwords) ─────────────────────
  - id: winscp.sessions
    app: WinSCP
    hive: hkcu
    key: 'Software\Martin Prikryl\WinSCP 2\Sessions'
    shape: subkeys
    sensitivity: reversible_secret
    secret_values: [Password, PasswordEncrypted, ProxyPassword, ProxyPasswordEnc, TunnelPassword, TunnelPasswordEncrypted, EncryptKey]
    config_values: [HostName, PortNumber, UserName, FSProtocol, LocalDirectory, RemoteDirectory, PublicKeyFile, Tunnel, TunnelHostName, TunnelUserName]
    what: Saved WinSCP sessions (host/port/user) plus stored passwords (obfuscated, reversible — NOT DPAPI)
    export_hint: 'WinSCP → Export/Backup sessions before the reset; the disk holds recoverable passwords, so wipe it afterwards'

  - id: winscp.security
    app: WinSCP
    hive: hkcu
    key: 'Software\Martin Prikryl\WinSCP 2\Configuration\Security'
    shape: values
    sensitivity: config_only
    config_values: [UseMasterPassword]
    what: Whether WinSCP protects stored passwords with a master password

  # ── Remote Desktop (mstsc) — connection history, no stored password here ────
  - id: rdp.mru
    app: Remote Desktop (mstsc)
    hive: hkcu
    key: 'Software\Microsoft\Terminal Server Client\Default'
    shape: values
    sensitivity: config_only
    unmatched: config   # each MRU* value is a machine you connected to
    what: Recently connected Remote Desktop machines (MRU list)

  - id: rdp.servers
    app: Remote Desktop (mstsc)
    hive: hkcu
    key: 'Software\Microsoft\Terminal Server Client\Servers'
    shape: subkeys
    sensitivity: config_only
    unmatched: config   # the subkey is the server; UsernameHint / CertHash are config
    config_values: [UsernameHint]
    what: Remote Desktop servers and their saved username hint

  # ── MPC-HC (config only; included so it is never silently forgotten) ────────
  - id: mpchc.settings
    app: MPC-HC
    hive: hkcu
    key: 'Software\MPC-HC\MPC-HC\Settings'
    shape: values
    sensitivity: config_only
    what: MPC-HC settings (recent files, preferences) — config only, no secret

  # ── TightVNC server (HKLM → needs elevation; password is a reversible hash) ──
  - id: tightvnc.server
    app: TightVNC Server
    hive: hklm
    key: 'SOFTWARE\TightVNC\Server'
    shape: values
    sensitivity: reversible_secret
    secret_values: [Password, PasswordViewOnly, ControlPassword]
    config_values: [RfbPort, HttpPort, AcceptRfbConnections, AcceptHttpConnections]
    what: TightVNC server passwords (reversibly hashed) — under HKLM, needs elevation to read
    export_hint: 'TightVNC stores a reversible password hash: treat it as a recoverable secret and reset the VNC password after the reset'
