# yaml-language-server: $schema=./ruleset.schema.json
# Capture stage — app-directory detection (app-zones increment 2). Outside the
# standard install roots (handled by app-zones.yaml) and the OS tree, executables
# live in custom install paths (D:\Tools, D:\Games) or as portable apps (a
# self-contained folder, often on another drive or a USB stick). These rules
# LABEL such executables so the report and the review GUI can tell a "portable
# app" / "installed app (custom location)" from unknown user data, and to arm the
# real-inventory step (increment 3).
#
# Verdict is REVIEW, never ignore: detection is not a licence to drop anything
# (forget-nothing). Whether an installed app is actually re-downloadable is
# decided later by cross-referencing the app inventory (increment 3) — not
# guessed here.
#
# WHY the capture stage (not deny): an executable inside a captured user zone
# (a downloaded installer in Downloads, a tool in Documents) must stay captured.
# Deny runs before capture, so a broad '**/*.exe' deny rule would STEAL those
# executables from their capture zone. In the capture stage these rules are the
# LEAST specific match (zero literal segments), so every real, anchored capture
# rule wins over them, and they only fire on executables that would otherwise
# fall to the default REVIEW — exactly the loose / custom / portable ones. An
# executable inside a deny zone (Program Files, Windows, a game payload) is
# already ignored one stage earlier, so these never see it.
#
# Granularity: the rules match the .exe itself (the app marker) — cheap (only
# executables run the ancestor probe) and it pinpoints WHERE the apps are. The
# surrounding files keep their normal verdict; splitting user data from the
# re-downloadable bundle inside an app folder is increments 3-4.
schema_version: 1
layer: capture
rules:
  - id: appdir.installed
    scope: drive
    match: '**/*.exe'
    verdict: review
    prio: high
    when:
      ancestor_marker: ['unins*.exe', 'uninstall.exe', 'uninstall.dat', 'unins*.dat']
    source: 'app-zones increment 2 (portable vs installed detection)'
    note: 'An executable whose folder tree carries an uninstaller: an installed app in a custom location. Re-downloadability is confirmed against the app inventory in a later step; until then it stays REVIEW.'

  - id: appdir.portable
    scope: drive
    match: '**/*.exe'
    verdict: review
    prio: high
    when:
      none:
        - ancestor_marker: ['unins*.exe', 'uninstall.exe', 'uninstall.dat', 'unins*.dat']
    source: 'app-zones increment 2 (portable vs installed detection)'
    note: 'A standalone executable with no uninstaller nearby: likely a portable / hand-placed app — the .exe may BE the app, so never ignore it without confirming it is re-downloadable.'
