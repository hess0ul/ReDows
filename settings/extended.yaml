# Extended settings catalog — verified registry settings (checklist Part 1 + Part 5).
# Read by 'redows settings' alongside system.yaml. Registry-only (R1); API/command
# settings (DNS, power plan, default browser…) belong to later readers.
schema_version: 1
settings:

  # ── File Explorer / taskbar / Start (HKCU Explorer\Advanced unless noted) ────
  - { id: explorer.open_to_this_pc, name: Open Explorer to This PC, category: ui, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: LaunchTo, type: dword, what: Explorer opens to This PC (vs Home), in_loop: true, indows_module: explorer-ui, default: '2', decode: { '1': This PC, '2': Home/Quick access, '3': Downloads } }
  - { id: explorer.drive_letters_first, name: Drive letters before label, category: ui, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: ShowDriveLettersFirst, type: dword, what: Show drive letter before the label, in_loop: true, indows_module: explorer-ui, default: '0', decode: { '0': after label, '4': before label } }
  - { id: explorer.nav_pane_expand, name: Nav pane auto-expand, category: ui, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: NavPaneExpandToCurrentFolder, type: dword, what: Auto-expand the navigation pane to the current folder, in_loop: true, indows_module: explorer-ui, default: '0', decode: { '0': off, '1': on } }
  - { id: taskbar.task_view_button, name: Task View button, category: ui, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: ShowTaskViewButton, type: dword, what: Show the Task View button on the taskbar, in_loop: true, indows_module: taskbar-startmenu, default: '1', decode: { '0': hidden, '1': shown } }
  - { id: taskbar.widgets, name: Widgets button, category: ui, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: TaskbarDa, type: dword, what: Show the Widgets button on the taskbar, in_loop: true, indows_module: taskbar-startmenu, default: '1', decode: { '0': hidden, '1': shown } }
  - { id: taskbar.chat, name: Chat button, category: ui, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: TaskbarMn, type: dword, what: Show the Chat/Teams button on the taskbar, in_loop: true, indows_module: taskbar-startmenu, default: '1', decode: { '0': hidden, '1': shown } }
  - { id: start.track_progs, name: Start recent apps, category: ui, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: Start_TrackProgs, type: dword, what: Show most-used apps in Start, in_loop: true, indows_module: taskbar-startmenu, default: '1', decode: { '0': off, '1': on } }
  - { id: start.run_as_different_user, name: Run as different user in Start, category: ui, hive: hkcu, key: 'Software\Policies\Microsoft\Windows\Explorer', value: ShowRunAsDifferentUserInStart, type: dword, what: Show "Run as different user" in Start, in_loop: true, indows_module: taskbar-startmenu, default: '0', decode: { '0': hidden, '1': shown }, source: 'reglages-checklist Part 5' }
  - { id: start.visible_places, name: Start folder icons by power button, category: ui, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Start', value: VisiblePlaces, type: binary, what: Folder icons (Settings/Explorer…) next to the power button, in_loop: true, indows_module: taskbar-startmenu, note: 'opaque binary blob — captured raw for replay, not decoded', source: 'reglages-checklist Part 5' }

  # ── Visual effects ──────────────────────────────────────────────────────────
  - { id: vfx.taskbar_animations, name: Taskbar animations, category: appearance, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: TaskbarAnimations, type: dword, what: Taskbar animations, in_loop: true, indows_module: visual-effects, default: '1', decode: { '0': off, '1': on } }
  - { id: vfx.menu_show_delay, name: Menu show delay, category: appearance, hive: hkcu, key: 'Control Panel\Desktop', value: MenuShowDelay, type: sz, what: Delay before menus open (ms), in_loop: true, indows_module: visual-effects, default: '400' }
  - { id: vfx.window_min_animate, name: Minimize/maximize animation, category: appearance, hive: hkcu, key: 'Control Panel\Desktop\WindowMetrics', value: MinAnimate, type: sz, what: Window minimize/maximize animation, in_loop: true, indows_module: visual-effects, default: '1', decode: { '0': off, '1': on } }
  - { id: vfx.aero_peek, name: Aero Peek, category: appearance, hive: hkcu, key: 'Software\Microsoft\Windows\DWM', value: EnableAeroPeek, type: dword, what: Peek at desktop, in_loop: true, indows_module: visual-effects, default: '1', decode: { '0': off, '1': on } }
  - { id: vfx.visual_fx, name: Visual effects mode, category: appearance, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects', value: VisualFXSetting, type: dword, what: Visual effects master setting, in_loop: true, indows_module: visual-effects, applied: false, note: 'visual-effects is the home but the VisualFXSetting line is commented (nuclear) — not applied by default', decode: { '0': let Windows choose, '1': best appearance, '2': best performance, '3': custom } }

  # ── Privacy / telemetry ─────────────────────────────────────────────────────
  - { id: privacy.activity_publish, name: Publish user activities, category: privacy, hive: hklm, key: 'SOFTWARE\Policies\Microsoft\Windows\System', value: PublishUserActivities, type: dword, what: Publish user activities (Timeline), in_loop: true, indows_module: privacy-telemetry, default: '1', decode: { '0': off, '1': on } }
  - { id: privacy.activity_feed, name: Activity feed (Timeline), category: privacy, hive: hklm, key: 'SOFTWARE\Policies\Microsoft\Windows\System', value: EnableActivityFeed, type: dword, what: Activity feed / Timeline, in_loop: true, indows_module: privacy-telemetry, default: '1', decode: { '0': off, '1': on } }
  - { id: privacy.tailored_experiences, name: Tailored experiences, category: privacy, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Privacy', value: TailoredExperiencesWithDiagnosticDataEnabled, type: dword, what: Tailored experiences with diagnostic data, in_loop: true, indows_module: privacy-telemetry, default: '1', decode: { '0': off, '1': on } }
  - { id: privacy.find_my_device, name: Find My Device, category: privacy, hive: hklm, key: 'SOFTWARE\Policies\Microsoft\FindMyDevice', value: AllowFindMyDevice, type: dword, what: Find My Device, in_loop: true, indows_module: privacy-telemetry, default: '1', decode: { '0': off, '1': on } }
  - { id: privacy.cdm_master, name: Content Delivery Manager (suggestions), category: privacy, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: ContentDeliveryAllowed, type: dword, what: Master switch for Start/lock-screen suggested content, in_loop: true, indows_module: privacy-telemetry, default: '1', decode: { '0': off, '1': on } }
  - { id: privacy.cloud_optimized_content, name: Cloud-optimized content, category: privacy, hive: hklm, key: 'SOFTWARE\Policies\Microsoft\Windows\CloudContent', value: DisableCloudOptimizedContent, type: dword, what: Cloud-optimized promoted content, in_loop: true, indows_module: base, note: 'the InDows base install sets DisableCloudOptimizedContent=1 — no module does', default: '0', decode: { '0': allowed, '1': disabled } }
  - { id: privacy.bing_search, name: Bing in Start/Search, category: privacy, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\Search', value: BingSearchEnabled, type: dword, what: Bing results in Start/Search, in_loop: true, indows_module: disable-bing-search, default: '1', decode: { '0': off, '1': on } }
  - { id: privacy.web_search, name: Web search (policy), category: privacy, hive: hklm, key: 'SOFTWARE\Policies\Microsoft\Windows\Windows Search', value: DisableWebSearch, type: dword, what: Web results in Search, in_loop: true, indows_module: disable-bing-search, default: '0', decode: { '0': web search on, '1': web search off } }
  - { id: privacy.resume, name: Resume across devices, category: privacy, hive: hkcu, key: 'Software\Microsoft\Windows\CurrentVersion\CrossDeviceResume\Configuration', value: IsResumeAllowed, type: dword, what: Continue on this PC what you started elsewhere, in_loop: true, indows_module: 'NEW:privacy-telemetry', default: '1', decode: { '0': off, '1': on }, source: 'reglages-checklist Part 5' }
  - { id: privacy.device_metadata, name: Device metadata download, category: privacy, hive: hklm, key: 'SOFTWARE\Microsoft\Windows\CurrentVersion\Device Metadata', value: PreventDeviceMetadataFromNetwork, type: dword, what: Auto-download manufacturer device apps/metadata, in_loop: true, indows_module: 'NEW:device-metadata', default: '0', decode: { '0': allowed, '1': prevented }, note: perso, source: 'reglages-checklist Part 5' }

  # ── Power / update ──────────────────────────────────────────────────────────
  - { id: power.fast_startup, name: Fast Startup (hiberboot), category: power, hive: hklm, key: 'SYSTEM\CurrentControlSet\Control\Session Manager\Power', value: HiberbootEnabled, type: dword, what: Fast Startup, in_loop: true, indows_module: power, default: '1', decode: { '0': off, '1': on } }
  - { id: power.cpu_throttling_off, name: CPU power throttling off, category: power, hive: hklm, key: 'SYSTEM\CurrentControlSet\Control\Power\PowerThrottling', value: PowerThrottlingOff, type: dword, what: CPU power throttling, in_loop: true, indows_module: power, applied: false, note: 'power is the home but PowerThrottlingOff is commented (advanced) — applied only if the user uncomments it', default: '0', decode: { '0': throttling on, '1': throttling off } }
  - { id: update.no_auto_reboot, name: No auto-reboot with users signed in, category: power, hive: hklm, key: 'SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU', value: NoAutoRebootWithLoggedOnUsers, type: dword, what: Block Windows Update auto-reboot while signed in, in_loop: true, indows_module: windows-update, default: '0', decode: { '0': off, '1': on } }
  - { id: update.delivery_optimization, name: Delivery Optimization mode, category: power, hive: hklm, key: 'SOFTWARE\Policies\Microsoft\Windows\DeliveryOptimization', value: DODownloadMode, type: dword, what: Delivery Optimization download mode, in_loop: true, indows_module: windows-update, decode: { '0': HTTP only (no peering), '1': LAN peers, '2': group peers, '3': internet peers } }

  # ── Security ────────────────────────────────────────────────────────────────
  - { id: security.bitlocker_auto_encrypt, name: Auto BitLocker encryption, category: security, hive: hklm, key: 'SYSTEM\CurrentControlSet\Control\BitLocker', value: PreventDeviceEncryption, type: dword, what: Prevent automatic device encryption, in_loop: true, indows_module: security, default: '0', decode: { '0': auto-encrypt allowed, '1': prevented } }
  - { id: security.uac_consent_admin, name: UAC admin consent prompt, category: security, hive: hklm, key: 'SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System', value: ConsentPromptBehaviorAdmin, type: dword, what: UAC elevation prompt behavior for admins, in_loop: true, indows_module: perso, note: 'only the private InDows config sets ConsentPromptBehaviorAdmin/PromptOnSecureDesktop; the public security module leaves the default', default: '5', decode: { '0': elevate without prompting, '2': prompt on secure desktop, '5': prompt for consent (non-Windows binaries) } }
  - { id: security.uac_enable_lua, name: UAC enabled (EnableLUA), category: security, hive: hklm, key: 'SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System', value: EnableLUA, type: dword, what: User Account Control on/off, in_loop: true, indows_module: none, note: 'no module (public or private) writes a non-default EnableLUA — left at default by design; redo by hand if changed', default: '1', decode: { '0': UAC off, '1': UAC on } }
  - { id: security.smartscreen, name: SmartScreen (Explorer), category: security, hive: hklm, key: 'SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer', value: SmartScreenEnabled, type: sz, what: SmartScreen for files/apps, in_loop: true, indows_module: none, note: 'the security module only warns on SmartScreenEnabled (commented danger-zone) — nothing applies it; redo by hand', decode: { 'Off': off, 'Warn': warn, 'Prompt': prompt, 'RequireAdmin': require admin } }
  - { id: system.shipped_reserves, name: Reserved storage, category: security, hive: hklm, key: 'SOFTWARE\Microsoft\Windows\CurrentVersion\ReserveManager', value: ShippedWithReserves, type: dword, what: Reserved storage (~7 GB), in_loop: true, indows_module: perso, note: 'reserved storage off is a private InDows config choice; the public misc module does not touch ReserveManager', decode: { '0': reserves off, '1': reserves on } }

  # ── Misc / system ───────────────────────────────────────────────────────────
  - { id: misc.verbose_status, name: Verbose logon status, category: misc, hive: hklm, key: 'SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System', value: VerboseStatus, type: dword, what: Verbose "Starting Windows" status messages, in_loop: true, indows_module: misc, default: '0', decode: { '0': off, '1': on } }
  - { id: input.hide_pointer_while_typing, name: Hide pointer while typing, category: input, hive: hkcu, key: 'Control Panel\Desktop', value: UserPreferencesMask, type: binary, what: 'Hide mouse pointer while typing (bit 16 of the mask)', in_loop: true, indows_module: visual-effects, note: 'opaque mask — captured raw; hide-pointer-while-typing is bit 16', source: 'reglages-checklist Part 5' }
  - { id: system.powershell_execution_policy, name: PowerShell execution policy (LocalMachine), category: developer, hive: hklm, key: 'SOFTWARE\Microsoft\PowerShell\1\ShellIds\Microsoft.PowerShell', value: ExecutionPolicy, type: sz, what: PowerShell script execution policy (machine scope), in_loop: true, indows_module: 'NEW:powershell-policy', note: 'effective value needs Get-ExecutionPolicy -List (precedence); this is the LocalMachine scope only', source: 'reglages-checklist Part 5' }

  # ── Performance / gaming ────────────────────────────────────────────────────
  - { id: perf.priority_separation, name: Foreground priority boost, category: performance, hive: hklm, key: 'SYSTEM\CurrentControlSet\Control\PriorityControl', value: Win32PrioritySeparation, type: dword, what: Foreground/background CPU quantum (perf tweak), in_loop: true, indows_module: performance }
  - { id: perf.system_responsiveness, name: Multimedia reserved CPU, category: performance, hive: hklm, key: 'SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: SystemResponsiveness, type: dword, what: CPU reserved for low-priority/multimedia, in_loop: true, indows_module: performance, default: '20' }
  - { id: gaming.hags, name: Hardware-accelerated GPU scheduling, category: performance, hive: hklm, key: 'SYSTEM\CurrentControlSet\Control\GraphicsDrivers', value: HwSchMode, type: dword, what: Hardware-accelerated GPU scheduling (HAGS), in_loop: true, indows_module: gaming, applied: false, note: 'gaming is the home but HwSchMode is commented (driver-dependent) — not applied by default', decode: { '1': off, '2': on } }
  - { id: gaming.game_mode, name: Game Mode, category: performance, hive: hkcu, key: 'Software\Microsoft\GameBar', value: AutoGameModeEnabled, type: dword, what: Windows Game Mode, in_loop: true, indows_module: gaming, default: '1', decode: { '0': off, '1': on } }
